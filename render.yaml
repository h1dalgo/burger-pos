services:
  - type: web
    name: burger-pos
    runtime: node
    repo: https://github.com/h1dalgo/burger-pos
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/products
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: burger-pos-db
          property: connectionString

databases:
  - name: burger-pos-db
    plan: free
    databaseName: burger_pos
    ipAllowList: []
